on:
  workflow_dispatch:
  delete:
    branches-ignore:
      - main
      - gh-pages
    tags-ignore:
      - v*

jobs:
  remove-integration-tests-reports:
    permissions:
      contents: write
    uses: ./.github/workflows/remove-integration-tests-report.yaml
    with:
      deleted-branch: ${{ github.event.ref }}
