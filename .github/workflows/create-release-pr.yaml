name: "Create release-please pull request"

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      APP_PRIVATE_KEY:
        required: true
    outputs:
      releases_created:
        description: "If true, a release PR has been merged"
        value: ${{ jobs.release-please.outputs.releases_created }}
      tag_name:
        description: "The release tag. Ex v1.4.0"
        value: ${{ jobs.release-please.outputs.tag_name }}

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Token
        id: generate-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ steps.generate-token.outputs.token }}
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}