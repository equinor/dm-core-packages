name: "Create release-please pull request"

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      RELEASE_PLEASE_TOKEN:
        description: "PAT for release-please to create releases and PRs"
        required: true
    outputs:
      releases_created:
        description: "If true, a release PR has been merged"
        value: ${{ jobs.release-please.outputs.releases_created }}
      tag_name:
        description: "The release tag. Ex v1.4.0"
        value: ${{ jobs.release-please.outputs.tag_name }}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}